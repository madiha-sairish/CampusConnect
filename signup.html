<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Signup - CampusConnect</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f3f5fb;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .card {
      background: white;
      padding: 30px;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
      width: 340px;
    }

    h2 {
      margin-top: 0;
      text-align: center;
      margin-bottom: 24px;
    }

    input {
      width: 100%;
      padding: 12px;
      margin-bottom: 14px;
      border: 1px solid #d9deea;
      border-radius: 10px;
      font-size: 14px;
      box-sizing: border-box;
    }

    button {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 10px;
      background: #5b4df0;
      color: white;
      font-size: 15px;
      cursor: pointer;
    }

    button:hover {
      background: #4a3fe0;
    }

    .help-text {
      margin-top: 12px;
      text-align: center;
      font-size: 13px;
      color: #666;
    }
  </style>
</head>
<body>
  <div class="card">
    <h2>Sign Up</h2>
    <input type="email" id="email" placeholder="Enter university email" />
    <input type="password" id="password" placeholder="Enter password" />
    <button id="signupBtn">Create Account</button>
    <div class="help-text">Only @dubai.bits-pilani.ac.in emails are allowed</div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getAuth, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBbMYt1jx1ZT8d6L9dg5Sz1ArvPC8_LVao",
      authDomain: "campusconnect-4f809.firebaseapp.com",
      projectId: "campusconnect-4f809",
      storageBucket: "campusconnect-4f809.appspot.com",
      messagingSenderId: "1070564995984",
      appId: "1:1070564995984:web:b330ec15b5d76c09b97915"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    document.getElementById("signupBtn").addEventListener("click", async () => {
      const email = document.getElementById("email").value.trim().toLowerCase();
      const password = document.getElementById("password").value.trim();

      if (!email.endsWith("@dubai.bits-pilani.ac.in")) {
        alert("Only university email is allowed.");
        return;
      }

      if (password.length < 6) {
        alert("Password must be at least 6 characters.");
        return;
      }

      try {
        await createUserWithEmailAndPassword(auth, email, password);
        alert("Signup successful ✅");
        window.location.href = "index.html";
      } catch (error) {
        alert(error.message);
        console.error(error);
      }
    });
  </script>
</body>
</html>
