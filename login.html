<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - CampusConnect</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f6fa;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
    }
    .card {
      background: white;
      padding: 30px;
      border-radius: 12px;
      width: 320px;
      text-align: center;
    }
    input {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      box-sizing: border-box;
    }
    button {
      padding: 10px 18px;
      background: #5b4df0;
      color: white;
      border: none;
      cursor: pointer;
    }
    #reportBox {
      display: none;
      margin-top: 14px;
    }
    #reportBtn {
      background: none;
      color: #5b4df0;
      border: none;
      cursor: pointer;
      margin-top: 14px;
    }
  </style>
</head>
<body>
  <div class="card">
    <h2>Login</h2>

    <input type="email" id="email" placeholder="Enter email" />
    <input type="password" id="password" placeholder="Enter password" />

    <button id="loginBtn">Sign In</button>

    <div>
      <button id="reportBtn">Having trouble? Report issue</button>
    </div>

    <div id="reportBox">
      <input type="email" id="reportEmail" placeholder="Your email" />
      <input type="text" id="reportReason" placeholder="Your issue" />
      <button id="submitReportBtn">Submit Request</button>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import {
      getAuth,
      signInWithEmailAndPassword,
      onAuthStateChanged
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
    import {
      getFirestore,
      collection,
      addDoc
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBbMYt1jx1ZT8d6L9dg5Sz1ArvPC8_LVao",
      authDomain: "campusconnect-4f809.firebaseapp.com",
      projectId: "campusconnect-4f809",
      storageBucket: "campusconnect-4f809.appspot.com",
      messagingSenderId: "1070564995984",
      appId: "1:1070564995984:web:b330ec15b5d76c09b97915"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    // already logged in -> go home
    onAuthStateChanged(auth, (user) => {
      if (user) {
        window.location.href = "index.html";
      }
    });

    // login
    document.getElementById("loginBtn").addEventListener("click", () => {
      const email = document.getElementById("email").value.trim().toLowerCase();
      const password = document.getElementById("password").value.trim();

      if (!email.endsWith("@dubai.bits-pilani.ac.in")) {
        alert("Only university email is allowed.");
        return;
      }

      signInWithEmailAndPassword(auth, email, password)
        .then(() => {
          alert("Login success ✅");
          window.location.href = "index.html";
        })
        .catch((error) => {
          alert(error.message);
        });
    });

    // toggle report box
    document.getElementById("reportBtn").addEventListener("click", () => {
      const box = document.getElementById("reportBox");
      box.style.display = box.style.display === "block" ? "none" : "block";
      document.getElementById("reportEmail").value =
        document.getElementById("email").value;
    });

    // store report
    document.getElementById("submitReportBtn").addEventListener("click", async () => {
      const email = document.getElementById("reportEmail").value.trim();
      const reason = document.getElementById("reportReason").value.trim();

      if (!email || !reason) {
        alert("Fill all fields");
        return;
      }

      try {
        await addDoc(collection(db, "reports"), {
          email,
          issue: reason,
          time: new Date()
        });
        alert("Request stored in database ✅");
        document.getElementById("reportReason").value = "";
      } catch (error) {
        alert("Error: " + error.message);
      }
    });
  </script>
</body>
</html>
